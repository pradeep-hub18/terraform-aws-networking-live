name: Terraform AWS Resources

on:
  workflow_dispatch:
    inputs:
      component:
        description: "Terraform component to run"
        required: true
        type: choice
        options:
          - networking
          - eks
          - nlb
          - ecr
      environment:
        description: "Terraform environment to run"
        required: true
        type: choice
        options:
          - DEV
          - STAGE
      action:
        description: "Terraform action to run"
        required: true
        default: plan
        type: choice
        options:
          - plan
          - apply
          - destroy
          - refresh

permissions:
  contents: read

concurrency:
  group: terraform-${{ inputs.component }}-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  terraform:
    name: Terraform ${{ inputs.action }} - ${{ inputs.component }} - ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.component }}/environments/${{ inputs.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.0.11

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init -backend-config="backend.hcl"

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        if: inputs.action == 'plan' || inputs.action == 'apply'
        run: terraform plan -input=false -out=tfplan

      - name: Terraform apply
        if: inputs.action == 'apply'
        run: terraform apply -input=false -auto-approve tfplan

      - name: Terraform destroy plan
        if: inputs.action == 'destroy'
        run: terraform plan -destroy -input=false

      - name: Terraform destroy
        if: inputs.action == 'destroy'
        run: terraform destroy -input=false -auto-approve

      - name: Terraform refresh plan
        if: inputs.action == 'refresh'
        run: terraform plan -refresh-only -input=false

      - name: Terraform refresh
        if: inputs.action == 'refresh'
        run: terraform apply -refresh-only -input=false -auto-approve
